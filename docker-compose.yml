services:
  app:
    image: ghcr.io/magnusoverli/sushe-online:latest
    # Always re-pull :latest on `up` so a deploy can never silently run a
    # stale cached image (the CI only builds/pushes; deploy is manual).
    pull_policy: always
    container_name: sushe-online
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - NO_COLOR=1
      - LOG_LEVEL=info
      - SESSION_SECRET=${SESSION_SECRET}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      - BASE_URL=${BASE_URL}
      - PORT=3000
      - DATA_DIR=/app/data
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - SPOTIFY_REDIRECT_URI=${SPOTIFY_REDIRECT_URI}
      - TIDAL_CLIENT_ID=${TIDAL_CLIENT_ID}
      - TIDAL_REDIRECT_URI=${TIDAL_REDIRECT_URI}
      - LASTFM_API_KEY=${LASTFM_API_KEY}
      - LASTFM_SECRET=${LASTFM_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-5}
      - CLAUDE_MAX_TOKENS=${CLAUDE_MAX_TOKENS:-1024}
      - CLAUDE_RATE_LIMIT_MS=${CLAUDE_RATE_LIMIT_MS:-1000}
      - ENABLE_RAM_ACCELERATION=${ENABLE_RAM_ACCELERATION:-false}
      - DB_PREWARM_ENABLED=${DB_PREWARM_ENABLED:-}
      - DB_PREWARM_MODE=${DB_PREWARM_MODE:-hot}
      - COVER_CACHE_ENABLED=${COVER_CACHE_ENABLED:-}
      - COVER_CACHE_MAX_BYTES=${COVER_CACHE_MAX_BYTES:-512MB}
      - COVER_CACHE_MAX_ITEMS=${COVER_CACHE_MAX_ITEMS:-10000}
      - RESPONSE_CACHE_MAX_BYTES=${RESPONSE_CACHE_MAX_BYTES:-256MB}
      - APP_PREWARM_ENABLED=${APP_PREWARM_ENABLED:-}
      - APP_PREWARM_BLOCKING=${APP_PREWARM_BLOCKING:-true}
      - APP_PREWARM_USERS_LIMIT=${APP_PREWARM_USERS_LIMIT:-100}
      - APP_PREWARM_COVERS_LIMIT=${APP_PREWARM_COVERS_LIMIT:-5000}
      - DATABASE_URL=postgres://postgres:example@/sushe?host=/var/run/postgresql
    volumes:
      - sushe-data:/app/data
      - postgres-socket:/var/run/postgresql
    tmpfs:
      - /tmp:size=512m,mode=1777
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '0.5'

  db:
    image: postgres:18.4
    ports:
      - '5433:5432' # Expose PostgreSQL for local development
    environment:
      POSTGRES_PASSWORD: example
      POSTGRES_DB: sushe
      # Enhanced logging for monitoring
      POSTGRES_INITDB_ARGS: '--auth-host=md5'
    volumes:
      - postgres-data:/var/lib/postgresql
      - postgres-socket:/var/run/postgresql
      - ./scripts/docker-entrypoint-upgrade.sh:/usr/local/bin/docker-entrypoint-upgrade.sh:ro
    entrypoint: ['/usr/local/bin/docker-entrypoint-upgrade.sh']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d sushe']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '4.0'
        reservations:
          memory: 2G
          cpus: '1.0'
    command: >
      postgres 
      -c log_destination=stderr 
      -c log_min_messages=error
      -c log_statement=none 
      -c log_duration=off 
      -c log_min_duration_statement=-1
      -c shared_buffers=2GB
      -c effective_cache_size=6GB
      -c maintenance_work_mem=512MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=64MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=32MB
      -c max_connections=100

volumes:
  sushe-data:
    external: true
    name: sushe-online_sushe-data
  postgres-data:
    external: true
    name: sushe-online_postgres-data
  postgres-socket:
    external: true
    name: sushe-online_postgres-socket
